<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GECH UTSAVA'26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- PAGE LOADER -->

<nav>
    <div class="nav-logo">UTSAVA'26</div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    <div class="nav-menu" id="nav-menu">
      <div class="nav-links">
        <a id="nav-home" href="index.html">Home</a>
        <a id="nav-about" href="about.html">About</a>
        <a id="nav-events" href="events.html" class="active">Events</a>
        <a id="nav-contact" href="contact.html">Our Team</a>
        <a id="nav-winners" href="winners.html">Winners</a>
        
      </div>

    </div>
  </nav>

<div id="events-page" class="page active">
    <div class="main-container">
      <div class="events-page">
        <h2 class="section-title" style="margin-top: 2rem;">All Events</h2>
        <div class="filter-container">
          <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="toggleFilters()">
            <span id="current-filter">All Events</span>
            <span class="chevron">▼</span>
          </button>
          <div class="events-filter" id="events-filter">
            <button class="filter-btn active" onclick="filterEvents('all',this)">All Events</button>
            <button class="filter-btn" onclick="filterEvents('Performing Arts',this)">🎭 Performing Arts</button>
            <button class="filter-btn" onclick="filterEvents('Literary',this)">📖 Literary</button>
            <button class="filter-btn" onclick="filterEvents('Visual Arts',this)">🎨 Visual Arts</button>
            <button class="filter-btn" onclick="filterEvents('Dance',this)">💃 Dance</button>
            <button class="filter-btn" onclick="filterEvents('Music',this)">🎵 Music</button>
            <button class="filter-btn" onclick="filterEvents('Games',this)">🎮 Games</button>
            <button class="filter-btn" onclick="filterEvents('Mega',this)">⭐ Mega Events</button>
          </div>
        </div>
        <div class="events-grid" id="events-grid"></div>
      </div>
    </div>
  </div>

<!-- GLOBAL FOOTER -->
  <footer>
    Made with Love © GEC Utsava'26 — Government Engineering College Hassan
  </footer>

<!-- EVENT MODAL -->
<div class="event-detail-overlay" id="event-overlay">
  <div class="event-detail-modal">
    <button class="modal-close" onclick="closeEventModal()">✕</button>
    <div class="modal-banner" id="modal-banner">
      <img id="modal-banner-img" src="" alt="">
      <div class="modal-banner-overlay"></div>
      <div class="modal-banner-emoji" id="modal-banner-emoji"></div>
    </div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta-row">
        <div class="modal-meta-item"><div class="modal-meta-label">📅 Date & Time</div><div class="modal-meta-value" id="modal-day"></div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">📍 Venue</div><div class="modal-meta-value" id="modal-venue"></div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">👥 Team Size</div><div class="modal-meta-value" id="modal-team"></div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">⏱ Duration</div><div class="modal-meta-value" id="modal-duration"></div></div>
      </div>
      <div id="modal-fee-row" style="margin-bottom:1.5rem;"></div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-section-title">📋 Rules & Regulations</div>
      <ul class="instructions-list" id="modal-instructions"></ul>
      <div class="modal-section-title">📞 Event Coordinators</div>
      <div class="coords-grid" id="modal-coords"></div>
      <a href="https://forms.gle/your-link-here" target="_blank" class="modal-reg-btn" id="modal-reg-btn" onclick="registerForEvent()">REGISTER FOR THIS EVENT</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<canvas id="starfield" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></canvas>

<script src="script.js"></script>
<script>
  window.addEventListener('load', function() {
    setTimeout(function() {
      var loader = document.getElementById('page-loader');
      if (loader) { loader.classList.add('hidden'); document.body.classList.add('loaded'); }
    }, 2000);
  });
</script>
</body>
</html>
